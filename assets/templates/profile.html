{% extends "base.html" %}
{% block content %}
<div class="profile-section">
    <h1>Profile</h1>
    <p><strong>Username:</strong> {{ user['username'] }}</p>
    <p><strong>Email:</strong> {{ user['email'] }}</p>
    <p><strong>Preferences:</strong> {{ user['preferences'] | join(', ') }}</p>
    <a href="{{ url_for('logout') }}" class="btn">Logout</a>
</div>
{% endblock %}
